# ============================================================
# printer.cfg — Add this section
# ============================================================

[infinity_flow]
mqtt_topic_prefix: infinity_flow
extruder: extruder
pause_mode: all_empty
swap_grace_period: 30
event_delay: 3.0

runout_gcode:
    M117 S1+: Filament exhausted!
    G91
    G1 Z5 F600
    G90
    G1 X0 Y0 F6000
    PAUSE

swap_gcode:
    M117 S1+: Switching to next spool...

insert_gcode:
    M117 S1+: New spool ready

enabled: True

# ---- Macros ----

[gcode_macro INFINITY_FLOW_ENABLE]
description: Enable S1+ filament monitoring
gcode:
    SET_FILAMENT_SENSOR SENSOR=infinity_flow ENABLE=1
    M117 S1+ monitoring ON

[gcode_macro INFINITY_FLOW_DISABLE]
description: Disable S1+ filament monitoring
gcode:
    SET_FILAMENT_SENSOR SENSOR=infinity_flow ENABLE=0
    M117 S1+ monitoring OFF

[gcode_macro INFINITY_FLOW_CHECK]
description: Check S1+ filament status
gcode:
    INFINITY_FLOW_STATUS



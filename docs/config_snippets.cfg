# ============================================================
# CONFIG REFERENCE — Infinity Flow S1+ Klipper Integration
#
# Configuration is split across two files:
#   • printer.cfg   — Klipper (pause logic, gcode templates)
#   • moonraker.conf — Moonraker (FlowQ cloud credentials)
#
# Both use [infinity_flow] as the section name.
# ============================================================


# ============================================================
# printer.cfg — Klipper section
#
# No [filament_switch_sensor] blocks or dummy pins needed.
# Virtual sensors are registered automatically by the module.
# ============================================================

[infinity_flow]

# Name of your printer's extruder (default: extruder)
# Change only if you have a multi-extruder setup with different names
extruder: extruder

# Pause behavior:
#   all_empty  → pause only when BOTH slots A and B are empty (recommended)
#   any_empty  → pause as soon as either slot empties
pause_mode: all_empty

# How long (seconds) to wait for the S1+ to complete a spool swap
# before triggering a runout. Set higher if your S1+ is slow.
swap_grace_period: 30

# Minimum seconds between consecutive runout/swap events (anti-bounce)
event_delay: 3.0

# GCode to run when all filament is exhausted (required)
runout_gcode:
    M117 S1+: Filament exhausted!
    G91
    G1 Z5 F600
    G90
    G1 X0 Y0 F6000
    PAUSE

# GCode to run when the S1+ starts switching from one spool to the other
# (optional — omit if you don't need a notification)
#swap_gcode:
#    M117 S1+: Switching to next spool...

# GCode to run when a new spool is inserted (optional)
# Only fires when NOT printing (useful for loading confirmation)
#insert_gcode:
#    M117 S1+: New spool loaded

# Enable/disable the integration at startup (default: True)
# enabled: True

# Custom sensor names — visible in Fluidd / Mainsail / KlipperScreen
# MUST match slot_a_sensor / slot_b_sensor in moonraker.conf (if changed)
# Defaults work for most setups — only change if you need custom names
# slot_a_sensor: infinity_flow_a
# slot_b_sensor: infinity_flow_b


# ---- Optional convenience macros ----------------------------
# Add these to printer.cfg to get one-tap buttons in the dashboard

[gcode_macro INFINITY_FLOW_ENABLE]
description: Enable S1+ filament monitoring
gcode:
    SET_FILAMENT_SENSOR SENSOR=infinity_flow ENABLE=1
    M117 S1+ monitoring ON

[gcode_macro INFINITY_FLOW_DISABLE]
description: Disable S1+ filament monitoring
gcode:
    SET_FILAMENT_SENSOR SENSOR=infinity_flow ENABLE=0
    M117 S1+ monitoring OFF

[gcode_macro INFINITY_FLOW_CHECK]
description: Print S1+ filament status to console
gcode:
    INFINITY_FLOW_STATUS


# ============================================================
# moonraker.conf — Moonraker section
# ============================================================

[infinity_flow]

# Required: your FlowQ account refresh token
# Get it by running: python3 flowq_setup_token.py
# Tokens expire after ~7 days — re-run the script to renew.
refresh_token: YOUR_REFRESH_TOKEN_HERE

# Optional: your S1+ device UUID
# Leave commented out if you have only one S1+ device.
# It will be auto-detected from your FlowQ account.
# s1plus_id: your-device-uuid-here

# Optional: polling interval in seconds (used when WebSocket
# is unavailable to poll the FlowQ REST API as fallback)
# poll_interval: 10

# Optional: override sensor names (must match printer.cfg)
# Only change if you set custom names in printer.cfg above
# slot_a_sensor: infinity_flow_a
# slot_b_sensor: infinity_flow_b

# ESPHome configuration for Infinity Flow S1+ Bridge
# Hardware: ESP32 DevKit (any ESP32 board with WiFi)
# Purpose: Read S1+ gearbox runout switches in parallel,
#          expose via MQTT to Klipper/Moonraker/HA

esphome:
  name: infinity-flow-bridge
  friendly_name: "Infinity Flow S1+ Bridge"
  comment: "Bridges S1+ runout sensors to Klipper via MQTT"

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.0.250
    gateway: 192.168.0.1
    subnet: 255.255.255.0
  ap:
    ssid: "IF-Bridge-Fallback"
    password: !secret fallback_password

captive_portal:

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

mqtt:
  broker: 192.168.0.100
  port: 1883
  topic_prefix: infinity_flow
  discovery: true

# ============================================================
# GPIO Configuration for S1+ Runout Switch Tapping
# ============================================================
# The S1+ has two gearbox runout switches (one per spool side).
# These are simple microswitches with a ball actuator.
# Wiring: Tap IN PARALLEL from the switch signal lines on
# the S1+ PCB connector. The switches are normally-closed
# when filament is present, and open when filament runs out.
#
# GPIO Assignments:
#   GPIO32 = Gearbox A runout switch (Side 1)
#   GPIO33 = Gearbox B runout switch (Side 2)
#   GPIO25 = S1+ motor activity detection (optional)
# ============================================================

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO32
      mode:
        input: true
        pullup: true
      inverted: false
    name: "Side A filament"
    id: side_a_filament
    device_class: problem
    filters:
      - delayed_on: 500ms
      - delayed_off: 1000ms
    on_press:
      then:
        - logger.log: "Side A: Filament PRESENT"
        - mqtt.publish:
            topic: "infinity_flow/sensor/side_a/state"
            payload: "present"
            retain: true
    on_release:
      then:
        - logger.log: "Side A: Filament RUNOUT"
        - mqtt.publish:
            topic: "infinity_flow/sensor/side_a/state"
            payload: "runout"
            retain: true

  - platform: gpio
    pin:
      number: GPIO33
      mode:
        input: true
        pullup: true
      inverted: false
    name: "Side B filament"
    id: side_b_filament
    device_class: problem
    filters:
      - delayed_on: 500ms
      - delayed_off: 1000ms
    on_press:
      then:
        - logger.log: "Side B: Filament PRESENT"
        - mqtt.publish:
            topic: "infinity_flow/sensor/side_b/state"
            payload: "present"
            retain: true
    on_release:
      then:
        - logger.log: "Side B: Filament RUNOUT"
        - mqtt.publish:
            topic: "infinity_flow/sensor/side_b/state"
            payload: "runout"
            retain: true

  - platform: template
    name: "All filament exhausted"
    id: all_filament_exhausted
    lambda: |-
      return !id(side_a_filament).state && !id(side_b_filament).state;
    on_press:
      then:
        - logger.log:
            level: ERROR
            format: "CRITICAL: All filament exhausted! Both sides empty."
        - mqtt.publish:
            topic: "infinity_flow/status"
            payload: "exhausted"
            retain: true

  - platform: gpio
    pin:
      number: GPIO25
      mode:
        input: true
        pullup: true
    name: "S1+ motor active"
    id: s1_motor_active
    filters:
      - delayed_on: 200ms
      - delayed_off: 500ms
    on_press:
      then:
        - mqtt.publish:
            topic: "infinity_flow/motor/state"
            payload: "active"
    on_release:
      then:
        - mqtt.publish:
            topic: "infinity_flow/motor/state"
            payload: "idle"

light:
  - platform: status_led
    name: "Bridge Status LED"
    pin: GPIO2

sensor:
  - platform: wifi_signal
    name: "Bridge WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "Bridge Uptime"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Bridge IP Address"

button:
  - platform: restart
    name: "Restart Bridge"

switch:
  - platform: template
    name: "Monitoring enabled"
    id: monitoring_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - logger.log: "Monitoring ENABLED"
    turn_off_action:
      - logger.log: "Monitoring DISABLED"
